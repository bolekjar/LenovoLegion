edition = "2024";

package legion.messages;


message RGBController
{
    enum ModeDirection {
        MODE_DIRECTION_LEFT         = 0;
        MODE_DIRECTION_RIGHT        = 1;
        MODE_DIRECTION_UP           = 2;
        MODE_DIRECTION_DOWN         = 3;
        MODE_DIRECTION_HORIZONTAL   = 4;
        MODE_DIRECTION_VERTICAL     = 5;
    }

    enum ModeColorType {
        MODE_COLORS_NONE            = 0;
        MODE_COLORS_PER_LED         = 1;
        MODE_COLORS_MODE_SPECIFIC   = 2;
        MODE_COLORS_RANDOM          = 3;
    }

    enum ZoneType {
        ZONE_TYPE_SINGLE = 0;
        ZONE_TYPE_LINEAR = 1;
        ZONE_TYPE_MATRIX = 2;
    }

    enum DeviceType {
        DEVICE_TYPE_MOTHERBOARD     = 0;
        DEVICE_TYPE_DRAM            = 1;
        DEVICE_TYPE_GPU             = 2;
        DEVICE_TYPE_COOLER          = 3;
        DEVICE_TYPE_LEDSTRIP        = 4;
        DEVICE_TYPE_KEYBOARD        = 5;
        DEVICE_TYPE_MOUSE           = 6;
        DEVICE_TYPE_MOUSEMAT        = 7;
        DEVICE_TYPE_HEADSET         = 8;
        DEVICE_TYPE_HEADSET_STAND   = 9;
        DEVICE_TYPE_GAMEPAD         = 10;
        DEVICE_TYPE_LIGHT           = 11;
        DEVICE_TYPE_SPEAKER         = 12;
        DEVICE_TYPE_VIRTUAL         = 13;
        DEVICE_TYPE_STORAGE         = 14;
        DEVICE_TYPE_CASE            = 15;
        DEVICE_TYPE_MICROPHONE      = 16;
        DEVICE_TYPE_ACCESSORY       = 17;
        DEVICE_TYPE_KEYPAD          = 18;
        DEVICE_TYPE_UNKNOWN         = 19;
    }

    message Mode {
        string   name           = 1;
        int32    value          = 2;
        uint32   flags          = 3;
        uint32   speed_min      = 4;
        uint32   speed_max      = 5;
        uint32   brightness_min = 6;
        uint32   brightness_max = 7;
        uint32   colors_min     = 8;
        uint32   colors_max     = 9;
        uint32   speed          = 10;
        uint32   brightness     = 11;
        uint32   direction      = 12;
        uint32   color_mode     = 13;
        repeated uint32 colors  = 14;
    }

    message LED {
        string  name  = 1;
        uint32  value = 2;
    }

    message MatrixMap {
        uint32          height = 1;
        uint32          width  = 2;
        repeated uint32 map    = 3;
    }

    message Segment {
        string   name       = 1;
        ZoneType type       = 2;
        uint32   start_idx  = 3;
        uint32   leds_count = 4;
    }

    message Zone {
        string            name       = 1;
        ZoneType          type       = 2;
        repeated LED      leds       = 3;
        repeated uint32   colors     = 4;
        uint32            start_idx  = 5;
        uint32            leds_count = 6;
        uint32            leds_min   = 7;
        uint32            leds_max   = 8;
        MatrixMap         matrix_map = 9;
        repeated Segment  segments   = 10;
        uint32            flags      = 11;
    }

    DeviceType         device_type     = 1;
    repeated LED       leds            = 2;
    repeated Zone      zones           = 3;
    repeated Mode      modes           = 4;
    repeated uint32    colors          = 5;
    int32              active_mode     = 6;
    uint32             profiles        = 7;
    uint64             active_profile  = 8;
    bool               applying_settings = 9;
}
